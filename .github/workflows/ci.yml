name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check syntax
        run: node --check server.js
      
      - name: Run linter (if configured)
        run: npm run lint --if-present
        continue-on-error: true

  test-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./github-mcp
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: uv sync
      
      - name: Check syntax
        run: python -m py_compile server.py
      
      - name: Run type checker (if configured)
        run: uv run pyright --if-present || true
        continue-on-error: true

  integration-check:
    runs-on: ubuntu-latest
    needs: [test-node, test-python]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate project structure
        run: |
          test -f server/server.js || (echo "Missing server/server.js" && exit 1)
          test -f github-mcp/server.py || (echo "Missing github-mcp/server.py" && exit 1)
          test -f server/package.json || (echo "Missing server/package.json" && exit 1)
          test -f github-mcp/pyproject.toml || (echo "Missing github-mcp/pyproject.toml" && exit 1)
          echo "✓ All required files present"
